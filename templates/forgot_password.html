<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Juicy Club Naturals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: var(--light-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-container { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; border: 1px solid var(--input-border); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="/" style="text-decoration: none;"><h1 style="font-size: 1.5rem; color: var(--text-main);"><span style="color: var(--primary-color);">Juicy</span> Club</h1></a>
            <h2 style="margin-top: 1rem; color: var(--text-main);">Reset Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Enter your email to receive a recovery link.</p>
        </div>

        {% include '_toasts.html' %}

        <form action="/forgot-password" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="john@example.com" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main);">
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="width: 100%; padding: 1rem; margin-top: 1rem; font-weight: 800;">Send Link</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">Remembered? <a href="/login" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Back to Login</a></p>
    </div>
</body>
</html>
