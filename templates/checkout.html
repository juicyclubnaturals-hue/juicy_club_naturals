<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Juicy Club Naturals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .checkout-container { max-width: 600px; margin: 100px auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow-sm); text-align: center;}
    </style>
</head>
<body>
    <header class="navbar scrolled" id="navbar" style="background: var(--card-bg); box-shadow: var(--shadow-sm);">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="{{ url_for('static', filename='images/juicy club naturals.png') }}" alt="Juicy Club Naturals Logo">
            </a>
            <nav class="nav-links">
                <a href="/cart">← Back to Cart</a>
            </nav>
            <div class="header-actions" style="display: flex; align-items: center; gap: 1.2rem;">
                <a id="theme-toggle" style="cursor: pointer; color: var(--text-main); font-size: 1.1rem;" title="Toggle Dark/Light Mode">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </a>
                <div class="mobile-menu-icon" id="mobile-menu-icon" style="cursor: pointer; font-size: 1.2rem; color: var(--text-main);">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </header>

    {% include '_toasts.html' %}

    <div class="container checkout-container">

        <h2>Complete Your Payment</h2>
        <p>Please wait while we redirect you to the payment gateway, or click the button below.</p>
        
        <form action="/payment/success" method="POST" id="razorpay-form">
            <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
            <input type="hidden" name="razorpay_order_id" id="razorpay_order_id" value="{{ razorpay_order_id }}">
            <input type="hidden" name="razorpay_signature" id="razorpay_signature">
        </form>

        <button id="rzp-button1" class="btn btn-primary">Pay Now</button>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ key_id }}",
            "amount": "{{ amount }}",
            "currency": "INR",
            "name": "Juicy Club Naturals",
            "description": "Premium Functional Wellness Shots Order",
            "order_id": "{{ razorpay_order_id }}",
            "handler": function (response){
                document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                document.getElementById('razorpay_signature').value = response.razorpay_signature;
                document.getElementById('razorpay-form').submit();
            },
            "prefill": {
                "email": "{{ user_email }}"
            },
            "theme": {
                "color": "#FF8C00"
            }
        };
        var rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', function (response){
            alert("Payment failed: " + response.error.description);
        });
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
        
        // Auto-open
        window.onload = function() {
            rzp1.open();
        }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
