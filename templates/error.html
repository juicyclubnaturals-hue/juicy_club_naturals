<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} - Juicy Club Naturals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFF5F0 0%, #FFF0E0 100%);
            padding: 2rem;
            text-align: center;
        }

        [data-theme="dark"] .error-page {
            background: linear-gradient(135deg, #1A1614 0%, #2D241E 100%);
        }

        .error-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 4rem 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        [data-theme="dark"] .error-container {
            background: rgba(30, 30, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .error-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--dark-bg);
        }

        [data-theme="dark"] .error-title {
            color: var(--white);
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .error-detail {
            background: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #d63031;
            margin-bottom: 2.5rem;
            word-break: break-all;
            display: inline-block;
            max-width: 100%;
        }

        [data-theme="dark"] .error-detail {
            background: rgba(255, 255, 255, 0.05);
            color: #ff7675;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .error-page { padding: 1rem; }
            .error-container { padding: 2.5rem 1.5rem; border-radius: 24px; }
            .error-code { font-size: 4rem; }
            .error-title { font-size: 1.5rem; }
            .error-message { font-size: 1rem; }
            .error-detail { font-size: 0.8rem; padding: 0.8rem; }
            .btn-group { flex-direction: column; }
            .btn-group .btn { width: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-container">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="error-code">{{ error_code }}</div>
            <h1 class="error-title">{{ error_title }}</h1>
            <p class="error-message">
                {{ error_description }}
            </p>
            
            {% if error_detail %}
            <div class="error-detail">
                <i class="fas fa-bug"></i> Details: {{ error_detail }}
            </div>
            {% endif %}

            <div class="btn-group">
                <a href="{{ url_for('home') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="javascript:location.reload();" class="btn btn-outline">
                    <i class="fas fa-redo"></i> Try Again
                </a>
            </div>
        </div>
    </div>

    <script>
        // Apply dark mode if user preference is saved
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
