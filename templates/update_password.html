<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password | Juicy Club Naturals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: var(--light-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-container { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; border: 1px solid var(--input-border); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--text-main);">New Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Choose a strong password for your account.</p>
        </div>

        {% include '_toasts.html' %}

        <form action="/update-password" method="POST">
            <div class="form-group">
                <label>Enter New Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required placeholder="••••••••" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main);">
                    <i class="fas fa-eye toggle-password" id="toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="width: 100%; padding: 1rem; margin-top: 1.5rem; font-weight: 800;">Update Password</button>
        </form>
    </div>

    <script>
        // Supabase sends the recovery token in the URL fragment (after the #)
        window.onload = function() {
            const hash = window.location.hash;
            if (hash && hash.includes('error=access_denied')) {
                alert("Your recovery link has expired or is invalid. Please request a new one.");
                window.location.href = "/forgot-password";
            }
            
            // If we have an access token in the hash, we need to ensure it's sent to the server
            // so the server can authenticate the user for the update.
            if (hash && hash.includes('access_token=')) {
                // We append the hash to the form action so the server can potentially see it 
                // or just keep it in the window context.
                console.log("Recovery session detected.");
            }
        };

        const togglePassword = document.querySelector('#toggle-password');
        const password = document.querySelector('#password');
        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
