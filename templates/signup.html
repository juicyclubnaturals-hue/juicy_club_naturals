<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Juicy Club Naturals - Join the Wellness Revolution</title>
    <meta name="description" content="Join Juicy Club Naturals and get access to the best natural shots for skin, gut health, and energy.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container { max-width: 500px; margin: 100px auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow-sm); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 6px; }
        .btn-full { width: 100%; text-align: center; }
    </style>
</head>
<body>
    <!-- Simple Header -->
    <header class="navbar scrolled" id="navbar" style="background: var(--card-bg); box-shadow: var(--shadow-sm);">
        <div class="container nav-container">
            <a href="/" class="logo">
                <span class="logo-juicy">Juicy</span> Club <span class="logo-naturals">Naturals</span>
            </a>
            </nav>
            <div class="header-actions" style="display: flex; align-items: center; gap: 1.2rem;">
                <a id="theme-toggle" style="cursor: pointer; color: var(--text-main); font-size: 1.1rem;" title="Toggle Dark/Light Mode">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </a>
                <div class="mobile-menu-icon" id="mobile-menu-icon" style="cursor: pointer; font-size: 1.2rem; color: var(--text-main);">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="container auth-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Join the Club</h2>
        
        {% include '_toasts.html' %}


        <form action="/signup" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required placeholder="Min 8 chars, 1 uppercase, 1 num, 1 special">
                    <span class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--primary-color); user-select: none;">Show</span>
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required placeholder="+91 98765 43210" value="+91 ">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" required placeholder="123 Street Name">
            </div>
            <div class="form-group">
                <label>Location / City</label>
                <input type="text" name="location" required placeholder="New York">
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">Sign Up</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="/login" style="color: var(--primary-color);">Login here</a></p>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
